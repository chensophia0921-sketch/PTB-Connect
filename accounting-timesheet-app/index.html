<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Accounting Timesheet</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div>
      <h1>Accounting Timesheet</h1>
      <p>会计事务所员工工时记录、客户计费与绩效汇总工具</p>
    </div>
    <div class="header-actions">
      <button id="exportBackupBtn">导出备份 JSON</button>
      <label class="upload-btn">导入备份 JSON<input id="importBackupInput" type="file" accept="application/json" hidden></label>
    </div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="entry">工时录入</button>
    <button class="tab" data-tab="staff">Staff Summary</button>
    <button class="tab" data-tab="client">Client Summary</button>
    <button class="tab" data-tab="settings">设置</button>
  </nav>

  <main>
    <section id="entry" class="panel active">
      <div class="card">
        <h2>添加工时记录</h2>
        <form id="timesheetForm" class="grid-form">
          <label>日期<input type="date" id="date" required></label>
          <label>员工<select id="staff" required></select></label>
          <label>客户<input list="clientList" id="client" placeholder="搜索或输入新客户" required><datalist id="clientList"></datalist></label>
          <label>Job Name<select id="job" required></select></label>
          <label>工时 Hours<input type="number" id="hours" min="0.1" step="0.1" placeholder="例如 1.5" required></label>
          <label>是否可计费<select id="billable"><option value="Yes">Yes</option><option value="No">No</option></select></label>
          <label>Hourly Rate<input type="number" id="rate" min="0" step="1" placeholder="例如 60"></label>
          <label class="wide">工作内容<textarea id="details" rows="3" placeholder="填写具体工作内容" required></textarea></label>
          <label class="wide">备注<textarea id="notes" rows="2" placeholder="可选"></textarea></label>
          <button class="primary" type="submit">添加 / 保存为一行</button>
        </form>
      </div>

      <div class="card">
        <div class="section-title">
          <h2>工时明细</h2>
          <div>
            <button id="exportEntriesCsv">导出 CSV</button>
            <button onclick="window.print()">生成 PDF / 打印</button>
          </div>
        </div>
        <div class="filters">
          <input id="searchBox" placeholder="搜索员工、客户、工作内容">
          <input type="month" id="monthFilter">
          <button id="clearFilters">清除筛选</button>
        </div>
        <div class="table-wrap"><table id="entriesTable"></table></div>
      </div>
    </section>

    <section id="staff" class="panel">
      <div class="card report-header">
        <h2>Staff Summary Report</h2>
        <div>
          <input type="month" id="staffMonth">
          <button id="exportStaffCsv">导出 CSV</button>
          <button onclick="window.print()">生成 PDF / 打印</button>
        </div>
      </div>
      <div id="staffCards" class="cards-grid"></div>
      <div class="card"><h3>员工详细记录</h3><div class="table-wrap"><table id="staffDetailTable"></table></div></div>
    </section>

    <section id="client" class="panel">
      <div class="card report-header">
        <h2>Client Summary Report</h2>
        <div>
          <input type="month" id="clientMonth">
          <button id="exportClientCsv">导出 CSV</button>
          <button onclick="window.print()">生成 PDF / 打印</button>
        </div>
      </div>
      <div id="clientCards" class="cards-grid"></div>
      <div class="card"><h3>客户详细记录</h3><div class="table-wrap"><table id="clientDetailTable"></table></div></div>
    </section>

    <section id="settings" class="panel">
      <div class="card">
        <h2>基础设置</h2>
        <p class="muted">每行一个名称。客户可以在录入时直接输入新客户，系统会自动加入清单。</p>
        <label>员工清单<textarea id="staffSettings" rows="8"></textarea></label>
        <label>客户清单<textarea id="clientSettings" rows="8"></textarea></label>
        <label>Job Name 清单<textarea id="jobSettings" rows="8"></textarea></label>
        <button class="primary" id="saveSettings">保存设置</button>
      </div>
    </section>
  </main>

  <footer>Data is saved in this browser only. 请定期导出 JSON 备份。</footer>
  <script src="app.js"></script>
</body>
</html>
